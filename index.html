
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>현장안전365 신고함</title>
<style>
:root{
  --green:#15a05a;--gd:#0f7f47;--gl:#e7f6ee;
  --ink:#1f2937;--sub:#6b7280;--line:#d6dbe2;--bg:#eef1f5;--r:12px;
  --c1:#e67e22;--c2:#c0392b;--c3:#8e44ad;--c4:#15a05a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
     font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
     font-size:15px;line-height:1.5}
.wrap{max-width:1200px;margin:0 auto;padding:16px}

/* 헤더 */
header{background:#fff;border:1px solid var(--line);border-radius:16px;
       padding:18px 20px;box-shadow:0 2px 10px rgba(20,40,30,.05);margin-bottom:14px}
header h1{font-size:20px;font-weight:800;margin-bottom:12px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.toolbar label{font-size:12px;color:var(--sub);font-weight:700;margin-right:4px}
.toolbar input[type=url]{flex:1;min-width:200px;padding:8px 10px;border:1px solid var(--line);
  border-radius:8px;font-size:13px;color:var(--ink)}
.toolbar input[type=date]{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.btn{padding:9px 16px;border:none;border-radius:8px;background:var(--green);color:#fff;
     font-size:13px;font-weight:800;cursor:pointer}
.btn.sm{padding:7px 12px;font-size:12px}
.btn.outline{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.red{background:#c0392b}
.btn:active{opacity:.85}
.btn:disabled{background:#9ca3af;cursor:default}

/* 요약카드 */
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.scard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;
       text-align:center;cursor:pointer;border-top:4px solid var(--line);transition:transform .1s}
.scard.active{transform:translateY(-2px);box-shadow:0 4px 14px rgba(20,40,30,.12)}
.scard .n{font-size:24px;font-weight:800}
.scard .l{font-size:11px;color:var(--sub);margin-top:2px;font-weight:700}
.scard[data-t="전체"]{border-top-color:#374151}
.scard[data-t="불안전한 행동"]{border-top-color:var(--c1)}
.scard[data-t="불안전한 상태"]{border-top-color:var(--c2)}
.scard[data-t="아차사고"]{border-top-color:var(--c3)}
.scard[data-t="위험성평가 및 개선제안"]{border-top-color:var(--c4)}
@media(max-width:700px){.summary{grid-template-columns:repeat(2,1fr)}}

/* 진행바 */
.prow{background:#fff;border:1px solid var(--line);border-radius:12px;
      padding:12px 16px;margin-bottom:14px}
.ptitle{font-size:13px;font-weight:800;margin-bottom:6px;display:flex;justify-content:space-between}
.pbar{height:10px;border-radius:5px;background:#eef1f5;overflow:hidden;display:flex}
.pbar .done{background:var(--green)}.pbar .ing{background:#f0ad4e}.pbar .none{background:#d6dbe2}
.pleg{display:flex;gap:12px;margin-top:6px;font-size:12px;color:var(--sub)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot.done{background:var(--green)}.dot.ing{background:#f0ad4e}.dot.none{background:#d6dbe2}

/* 브리핑 */
.brief{background:#fff;border:1px solid var(--line);border-radius:14px;
       padding:14px 16px;margin-bottom:14px}
.brief-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.brief-head h2{font-size:15px;font-weight:800;margin:0}
.bstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.bs{background:#f8fafb;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.bs-l{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:3px}
.bs-v{font-size:14px;font-weight:800}
@media(max-width:600px){.bstats{grid-template-columns:repeat(2,1fr)}}
.bcounts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.bc{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;background:var(--gl);color:var(--gd)}
.bc.zero{background:#f3f4f6;color:var(--sub)}
.blist{list-style:none;display:flex;flex-direction:column;gap:5px}
.blist li{font-size:13px;display:flex;gap:8px;align-items:flex-start}
.b-badge{flex:0 0 auto;font-size:11px;padding:2px 8px;border-radius:999px;color:#fff;font-weight:800;margin-top:1px}
.b-badge[data-t="불안전한 행동"]{background:var(--c1)}
.b-badge[data-t="불안전한 상태"]{background:var(--c2)}
.b-badge[data-t="아차사고"]{background:var(--c3)}
.b-badge[data-t="위험성평가 및 개선제안"]{background:var(--c4)}

/* 신고 카드 */
.icard{background:#fff;border:1px solid var(--line);border-radius:14px;
       padding:18px;box-shadow:0 2px 8px rgba(20,40,30,.04);margin-bottom:12px}
.icard-head{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:10px}
.badge{display:inline-block;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:800;color:#fff}
.badge[data-t="불안전한 행동"]{background:var(--c1)}
.badge[data-t="불안전한 상태"]{background:var(--c2)}
.badge[data-t="아차사고"]{background:var(--c3)}
.badge[data-t="위험성평가 및 개선제안"]{background:var(--c4)}
.badge.etc{background:#9ca3af}
.ctime{color:var(--sub);font-size:12px}
.cid{color:var(--sub);font-size:11px;margin-left:auto}
.ctitle{font-size:17px;font-weight:800;margin:6px 0}
.cmeta{font-size:13px;color:var(--sub);display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px}
.cmeta b{color:var(--ink);font-weight:700}

/* 사진 영역 — 최대한 크게 */
.photo-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.photo-box{border-radius:12px;overflow:hidden;border:2px solid var(--line);background:#f8fafb}
.photo-box.danger{border-color:#f87171}
.photo-box.action{border-color:#86efac}
.photo-box-title{padding:8px 12px;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.photo-box.danger .photo-box-title{background:#fff8f8;color:var(--c2)}
.photo-box.action .photo-box-title{background:#f0fdf4;color:var(--gd)}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;padding:4px}
.photo-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;cursor:pointer;border-radius:6px;display:block}
.photo-grid img:only-child{grid-column:1/-1;aspect-ratio:16/9}
.photo-item{position:relative;display:block}
.photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;cursor:pointer;border-radius:6px;display:block}
.photo-item:only-child{grid-column:1/-1}
.photo-item:only-child img{aspect-ratio:16/9}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(192,57,43,.85);color:#fff;border:none;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;z-index:2}
.photo-del:hover{background:#c0392b}
/* 편집 패널 */
.edit-panel{display:none;background:#f8fafb;border:1.5px dashed var(--line);border-radius:10px;padding:12px;margin-top:8px;gap:8px;flex-direction:column}
.edit-panel.show{display:flex}
.edit-panel input,.edit-panel textarea{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;width:100%}
.edit-panel textarea{min-height:60px;resize:vertical}
.edit-panel .row{display:flex;gap:8px;flex-wrap:wrap}
.edit-panel label{font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:3px}
.card-actions{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.btn.edit-toggle{background:#f3f4f6;color:var(--ink);border:1px solid var(--line)}
.btn.edit-toggle:hover{background:#e5e7eb}
.btn.delete-card{background:#fee2e2;color:#c0392b;border:1px solid #fca5a5}
.btn.delete-card:hover{background:#fecaca}
.photo-empty{padding:24px;text-align:center;color:var(--sub);font-size:13px}
.photo-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;
               padding:10px;border:none;background:transparent;cursor:pointer;
               font-size:13px;font-weight:700;color:var(--sub);width:100%;
               border-top:1px dashed var(--line)}
.photo-add-btn:hover{color:var(--gd)}
.photo-ing{font-size:12px;color:var(--gd);font-weight:700;padding:6px 12px;display:none}

/* 상태행 */
.strow{display:flex;align-items:center;gap:8px;margin-top:12px;
       border-top:1px dashed var(--line);padding-top:12px;flex-wrap:wrap}
.strow label{font-size:12px;color:var(--sub);font-weight:700}
.strow select{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-weight:700}
.strow .memo{flex:1;min-width:120px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px}
select.s0{color:var(--c2)}select.s1{color:#b9770e}select.s2{color:var(--gd)}

/* 최종확인 */
.aprow-done{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.approved{padding:6px 14px;border-radius:999px;background:var(--gl);color:var(--gd);font-size:13px;font-weight:800}
.approvebtn{padding:8px 18px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:13px;font-weight:800;cursor:pointer}
.approvebtn:disabled{background:#9ab4e8;cursor:default}

/* AI */
.aibox{margin-top:12px;border-radius:10px;padding:12px 14px;border:1.5px solid #e0e7ff;background:linear-gradient(135deg,#f0f4ff,#fafaff)}
.aihead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.aititle{font-size:13px;font-weight:800;color:#3730a3}
.rbadge{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800;color:#fff}
.rbadge.상{background:var(--c2)}.rbadge.중{background:var(--c1)}.rbadge.하{background:var(--green)}
.aibody{font-size:13px;color:#374151;line-height:1.7}
.ailaw{margin-top:6px;font-size:12px;color:#6366f1;font-weight:700}
.aibtn{padding:6px 12px;border:1.5px solid #c7d2fe;border-radius:8px;background:#f0f4ff;color:#3730a3;font-size:12px;font-weight:800;cursor:pointer}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.aing{font-size:13px;color:#6366f1;animation:pulse 1.2s infinite}

/* 라이트박스 */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;
    align-items:center;justify-content:center;z-index:1000;padding:16px;flex-direction:column;gap:12px}
.lb.show{display:flex}
.lb img{max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain}
.lb-close{padding:10px 24px;border:none;border-radius:8px;background:#fff;color:var(--ink);font-size:14px;font-weight:800;cursor:pointer}

/* 전체화면 브리핑 */
.bfull{position:fixed;inset:0;background:#0f172a;color:#fff;z-index:1100;display:none;flex-direction:column;padding:32px}
.bfull.show{display:flex}
.bfull-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.bfull-head h2{font-size:28px;font-weight:800;margin:0}
.bfclose{background:#1e293b;color:#fff;border:1px solid #334155;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer}
.bfcounts{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.bfcounts .bc{padding:10px 18px;font-size:18px;background:#1e293b}
.bfcounts .bc b{font-size:24px;display:block;margin-bottom:2px}
.bfstats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.bfstats .bs{background:#1e293b;border-radius:12px;padding:12px 14px}
.bflist{list-style:none;overflow-y:auto;flex:1}
.bflist li{font-size:20px;line-height:1.6;padding:12px 0;border-bottom:1px solid #1e293b;display:flex;gap:12px;align-items:flex-start}

.empty{text-align:center;color:var(--sub);padding:40px 0;font-size:14px}

/* TBM 참석 섹션 */
/* 교육이수 확인서 */
.edu-sec{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:none}
.edu-sec-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.edu-sec-head h2{font-size:15px;font-weight:800;margin:0}
.edu-count-badge{background:#e7f6ee;border-radius:12px;padding:12px 20px;text-align:center;margin-bottom:12px}
.edu-count-badge .num{font-size:26px;font-weight:800;color:#0f7f47}
.edu-count-badge .lbl{font-size:12px;color:#6b7280;margin-top:2px}

/* 법정서식 확인서 */
.cert-wrap{background:#fff;border:2px solid #333;padding:24px;font-family:"맑은 고딕","Apple SD Gothic Neo",sans-serif;font-size:12px;margin-top:14px}
.cert-title{text-align:center;font-size:20px;font-weight:900;letter-spacing:4px;border-bottom:3px double #333;padding-bottom:10px;margin-bottom:6px}
.cert-sub{text-align:center;font-size:11px;color:#666;margin-bottom:16px}
.cert-info{width:100%;border-collapse:collapse;margin-bottom:12px}
.cert-info td{border:1px solid #999;padding:6px 8px;font-size:12px}
.cert-info .lbl{background:#f0f0f0;font-weight:700;width:80px;text-align:center}
.cert-edu-table{width:100%;border-collapse:collapse;margin-bottom:12px}
.cert-edu-table th{background:#333;color:#fff;padding:7px;text-align:center;font-size:11px;border:1px solid #333}
.cert-edu-table td{border:1px solid #999;padding:6px;text-align:center;font-size:11px}
.cert-text{font-size:12px;line-height:2;text-align:center;padding:10px;border:1px solid #ccc;background:#fafafa;margin-bottom:10px}
.cert-date{text-align:center;font-size:13px;font-weight:700;margin:12px 0}
.cert-signs{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.cert-sign{border:1px solid #999;padding:10px;text-align:center}
.cert-sign .stitle{font-size:11px;color:#666;margin-bottom:20px}
.cert-sign .stamp{width:50px;height:50px;border:2px solid #c0392b;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#c0392b;font-weight:900;font-size:10px}
.cert-sign .sname{font-weight:700;font-size:12px;border-top:1px solid #333;padding-top:4px;margin-top:4px}
.cert-footer{font-size:10px;color:#999;text-align:center;margin-top:10px;padding-top:8px;border-top:1px solid #ddd}

/* 이수자 목록 테이블 */
.edu-names-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.edu-names-table th{background:#1f2937;color:#fff;padding:7px;text-align:center;border:1px solid #333}
.edu-names-table td{border:1px solid #999;padding:6px 8px;text-align:center}
.edu-names-table tr:nth-child(even) td{background:#fafafa}

@media print{
  .edu-sec-head .btn,.edu-sec-head button{display:none!important}
  .cert-wrap{border:2px solid #333;page-break-inside:avoid}
}

.tbm-sec{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.tbm-sec-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tbm-sec-head h2{font-size:15px;font-weight:800;margin:0}
.tbm-count-badge{background:var(--gl);color:var(--gd);font-size:22px;font-weight:800;
  padding:10px 20px;border-radius:12px;text-align:center;margin-bottom:12px}
.tbm-count-badge span{font-size:12px;color:var(--sub);display:block;margin-top:2px;font-weight:500}
.tbm-table{width:100%;border-collapse:collapse;font-size:13px}
.tbm-table th{background:#f8fafb;padding:8px 10px;text-align:left;font-weight:700;
  border-bottom:2px solid var(--line);color:var(--sub);font-size:12px}
.tbm-table td{padding:8px 10px;border-bottom:1px solid var(--line)}
.tbm-table tr:last-child td{border-bottom:none}
.tbm-table tr:hover td{background:#f8fafb}
@media print{.tbm-sec{break-inside:avoid;page-break-inside:avoid}}
.loading{text-align:center;color:var(--sub);padding:30px 0}

/* ── 현장 관리 패널 ── */
#siteManagerPanel{
  display:none;background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:16px 20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(20,40,30,.05)
}
body.admin-mode #siteManagerPanel{ display:block; }
.sm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sm-head h3{font-size:14px;font-weight:800;margin:0}
.sm-list{display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto}
.sm-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
         border:1px solid var(--line);border-radius:10px;background:#fafbfc}
.sm-name{flex:1;font-size:13px;font-weight:700}
.sm-status{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px}
.sm-status.on{background:var(--gl);color:var(--gd)}
.sm-status.off{background:#fee2e2;color:var(--c2)}
.toggle-btn{padding:5px 14px;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer}
.toggle-btn.on{background:#fee2e2;color:var(--c2)}
.toggle-btn.off{background:var(--gl);color:var(--gd)}
.sm-empty{text-align:center;color:var(--sub);font-size:13px;padding:16px}

/* ── 관리자 잠금 ── */
.admin-only{ display:none !important; }          /* 잠금 상태: 숨김 */
body.admin-mode .admin-only{ display:'' !important; }  /* 관리자 모드: 표시 */
body.admin-mode .admin-only.flex{ display:flex !important; }
body.admin-mode .admin-only.inline{ display:inline-block !important; }

/* 관리자 로그인 배너 */
#adminBar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 16px;border-radius:10px;margin-bottom:10px;
  background:#fef9ee;border:1px solid #f0ad4e;font-size:13px;
}
#adminBar.on{ background:var(--gl);border-color:var(--green); }
#adminBar input{
  padding:7px 12px;border:1px solid var(--line);border-radius:8px;
  font-size:13px;width:160px;letter-spacing:3px;
}
#adminBar input:focus{outline:none;border-color:var(--green);}
.admin-badge{
  padding:4px 12px;border-radius:999px;font-size:12px;font-weight:800;
  background:var(--gl);color:var(--gd);display:none;
}
body.admin-mode .admin-badge{ display:inline-block; }
/* 잠금 상태일 때 관리자 전용 필드를 읽기전용처럼 보이게 */
body:not(.admin-mode) .stedit{ pointer-events:none;opacity:.5; }
body:not(.admin-mode) .memo{ pointer-events:none;opacity:.5; }

@media print{
  @page{size:A4 portrait;margin:15mm 12mm}
  body{background:#fff;font-size:12px}
  .wrap{max-width:100%;padding:0}

  /* 숨길 요소 */
  header .toolbar,
  .lb,.summary,.prow,.strow select,
  .btn,.bfull,.photo-add-btn,.approvebtn,
  .aibtn,.aibox,.clearPhotos,.clearAll,
  #clearDate,#printBtn,#clearPhotos,#clearAll{display:none !important}

  /* 헤더 */
  header{border-radius:0;box-shadow:none;padding:10px 0;margin-bottom:10px;border:none;border-bottom:2px solid #333}
  header h1{font-size:16px;margin-bottom:2px}

  /* 브리핑 */
  .brief{border-radius:0;box-shadow:none;page-break-after:avoid;margin-bottom:10px}
  .bstats{grid-template-columns:repeat(4,1fr);gap:6px}
  .bs{padding:6px 8px}
  .bs-l{font-size:10px}.bs-v{font-size:12px}

  /* 카드 */
  .icard{break-inside:avoid;page-break-inside:avoid;
         box-shadow:none;border-radius:6px;padding:12px;margin-bottom:10px}
  .badge{font-size:11px;padding:3px 8px}
  .ctitle{font-size:14px}
  .cmeta{font-size:11px;gap:10px}

  /* 사진 — A4에서 크게 */

<script>
var $ = function(id){ return document.getElementById(id); };
var TYPES = ['불안전한 행동','불안전한 상태','아차사고','위험성평가 및 개선제안'];
var DB_NAME='sf365_photos', DB_VER=1, DB_STORE='photos';
var db=null, allItems=[], activeType='전체', activeSite='전체';

/* ── 비밀번호 (난독화) ── */
// 관리자 고정 비번: 4627077
var _pa=function(){var _v=[52,54,50,55,48,55,55];return _v.map(function(c){return String.fromCharCode(c);}).join('');};
// 담당자 월별 비번: 7077 + 연도2자리 + 월
var _pm=function(){var _x=[55,48,55,55],_d=new Date(),_y=_d.getFullYear()%100,_m=_d.getMonth()+1;return _x.map(function(c){return String.fromCharCode(c);}).join('')+_y+_m;};

/* ── 로그인 상태 ── */
var loginRole = ''; // 'admin' | 'staff'
var loginSiteValue = ''; // 담당자 현장명

/* ── 현장 비활성화 관리 ── */
var BLOCKED_KEY = 'sf365_blocked_sites';
function getBlockedSites(){
  try{ return JSON.parse(localStorage.getItem(BLOCKED_KEY)||'[]'); }catch(e){ return []; }
}
function isSiteBlocked(site){
  return getBlockedSites().indexOf(site) >= 0;
}
function toggleSiteBlock(site){
  var blocked = getBlockedSites();
  var idx = blocked.indexOf(site);
  if(idx >= 0){ blocked.splice(idx,1); }
  else{ blocked.push(site); }
  localStorage.setItem(BLOCKED_KEY, JSON.stringify(blocked));
  renderSiteManager();
}
function toggleSiteManager(){
  var panel = document.getElementById('siteManagerPanel');
  panel.style.display = (panel.style.display==='none'||panel.style.display==='') ? 'block' : 'none';
  if(panel.style.display==='block') renderSiteManager();
}
function renderSiteManager(){
  var list = document.getElementById('smList');
  if(!list) return;
  // 현재 데이터에서 현장 목록 추출
  var sites = [];
  allItems.forEach(function(it){ var s=String(it.site||'').trim(); if(s&&sites.indexOf(s)<0) sites.push(s); });
  if(!sites.length){ list.innerHTML='<div class="sm-empty">신고 데이터가 없거나 데이터를 먼저 로드해주세요.</div>'; return; }
  var blocked = getBlockedSites();
  list.innerHTML = sites.map(function(s){
    var isBlocked = blocked.indexOf(s)>=0;
    return '<div class="sm-item">'+
      '<span class="sm-name">📍 '+esc(s)+'</span>'+
      '<span class="sm-status '+(isBlocked?'off':'on')+'">'+(isBlocked?'비활성':'활성')+'</span>'+
      '<button class="toggle-btn '+(isBlocked?'off':'on')+'" onclick="toggleSiteBlock(\'' + esc(s) + '\')">'+
        (isBlocked?'활성화':'차단')+
      '</button>'+
    '</div>';
  }).join('');
}

/* ── 로그인 ── */
function adminLogin(){
  var pw   = $('adminPw').value;
  var site = $('loginSite').value;

  if(site === '__admin__' && pw === _pa()){
    // 관리자 로그인 → 전체 현장
    loginRole = 'admin'; loginSiteValue = '전체';
    activeSite = '전체';
    document.body.classList.add('admin-mode');
    $('adminBar').classList.add('on');
    $('adminLogoutBtn').style.display='';
    $('adminBadge').textContent='✅ 관리자 (전체현장)';
    $('adminPw').value=''; $('adminMsg').textContent='';
    sessionStorage.setItem('sf365_role','admin');
    sessionStorage.setItem('sf365_site','전체');
    load();

  } else if(site !== '__admin__' && pw === _pm()){
    // 차단된 현장인지 확인
    if(isSiteBlocked(site)){
      $('adminMsg').textContent='현재 사용이 제한된 현장입니다. 관리자에게 문의하세요.';
      $('adminPw').value='';
      setTimeout(function(){ $('adminMsg').textContent=''; },3000);
      return;
    }
    // 담당자 로그인 → 해당 현장만
    loginRole = 'staff'; loginSiteValue = site;
    activeSite = site;
    document.body.classList.add('admin-mode');
    $('adminBar').classList.add('on');
    $('adminLogoutBtn').style.display='';
    $('adminBadge').textContent='✅ '+site;
    $('adminPw').value=''; $('adminMsg').textContent='';
    // 전체현장 옵션 비활성화
    var opt = $('loginSite').querySelector('option[value="__admin__"]');
    if(opt) opt.disabled = true;
    sessionStorage.setItem('sf365_role','staff');
    sessionStorage.setItem('sf365_site', site);
    load();

  } else {
    $('adminMsg').textContent='비밀번호가 틀렸습니다.';
    $('adminPw').value='';
    setTimeout(function(){ $('adminMsg').textContent=''; },2000);
  }
}

function adminLogout(){
  loginRole=''; loginSiteValue='';
  activeSite='전체';
  document.body.classList.remove('admin-mode');
  $('adminBar').classList.remove('on');
  $('adminLogoutBtn').style.display='none';
  $('adminBadge').textContent='✅ 관리자';
  var opt = $('loginSite').querySelector('option[value="__admin__"]');
  if(opt) opt.disabled = false;
  sessionStorage.removeItem('sf365_role');
  sessionStorage.removeItem('sf365_site');
  render();
}

/* ── 새로고침 후 세션 유지 ── */
(function(){
  var role = sessionStorage.getItem('sf365_role');
  var site = sessionStorage.getItem('sf365_site');
  if(role){
    loginRole = role; loginSiteValue = site||'전체';
    activeSite = loginSiteValue;
    document.body.classList.add('admin-mode');
    $('adminBar').classList.add('on');
    $('adminLogoutBtn').style.display='';
    $('adminBadge').textContent = role==='admin' ? '✅ 관리자 (전체현장)' : '✅ '+site;
    if(role==='staff'){
      var opt=$('loginSite').querySelector('option[value="__admin__"]');
      if(opt) opt.disabled=true;
    }
  }
})();

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── IndexedDB 초기화 ── */
function initDB(cb){
  var req=indexedDB.open(DB_NAME,DB_VER);
  req.onupgradeneeded=function(e){
    var d=e.target.result;
    if(!d.objectStoreNames.contains(DB_STORE)) d.createObjectStore(DB_STORE,{keyPath:'key'});
  };
  req.onsuccess=function(e){ db=e.target.result; cb(); };
  req.onerror=function(){ cb(); };
}

function dbGet(key,cb){
  if(!db){ cb(null); return; }
  var tx=db.transaction(DB_STORE,'readonly');
  var req=tx.objectStore(DB_STORE).get(key);
  req.onsuccess=function(e){ cb(e.target.result?e.target.result.val:null); };
  req.onerror=function(){ cb(null); };
}
function dbSet(key,val){
  if(!db) return;
  var tx=db.transaction(DB_STORE,'readwrite');
  tx.objectStore(DB_STORE).put({key:key,val:val});
}

/* ── 사진 저장/로드 ── */
function photoKey(reportId,type){ return 'photo_'+reportId+'_'+type; }

function loadPhotos(reportId,type,cb){
  dbGet(photoKey(reportId,type),function(val){ cb(val||[]); });
}
function savePhoto(reportId,type,dataUrl,cb){
  loadPhotos(reportId,type,function(arr){
    arr.push(dataUrl);
    dbSet(photoKey(reportId,type),arr);
    if(cb) cb(arr);
  });
}

/* ── 이미지 압축 ── */
function compress(file,cb){
  var r=new FileReader(); r.onload=function(e){
    var img=new Image(); img.onload=function(){
      var w=img.width,h=img.height;
      // 최대 1600px (크게 유지)
      var max=1600;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;}
      else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.92)); // 품질 높게
    }; img.src=e.target.result;
  }; r.readAsDataURL(file);
}

/* ── API 주소 고정 설정 ── */
var FIXED_API = 'https://script.google.com/macros/s/AKfycbzfZRkIaCWfKHl5KoLDGAtPjZiTSr_OrnHX1Xgdath7X5jSNecR9I5BoWDjhVqqbDI/exec';
$('apiUrl').value = FIXED_API;
// localStorage 무시하고 항상 고정 주소 사용
localStorage.setItem('sf365_api2', FIXED_API);

/* ── 현장 목록 로드 (구글 시트 '현장목록' 탭) ── */
var SITE_LIST = []; // 전역 현장 목록

function loadSiteList(){
  var url = FIXED_API + '?action=site_list';
  fetch(url, {redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok && data.sites && data.sites.length){
        SITE_LIST = data.sites;
        var sel = $('loginSite');
        var cur = sel.value;
        // 전체현장(관리자) 옵션 유지 + 현장 목록 추가
        sel.innerHTML = '<option value="__admin__">전체현장 (관리자)</option>';
        data.sites.forEach(function(s){
          var opt = document.createElement('option');
          opt.value = s; opt.textContent = s;
          if(s === cur) opt.selected = true;
          sel.appendChild(opt);
        });
        // 담당자 로그인 상태면 전체현장 비활성화
        if(loginRole === 'staff'){
          var adminOpt = sel.querySelector('option[value="__admin__"]');
          if(adminOpt) adminOpt.disabled = true;
        }
      }
    })
    .catch(function(){ /* 현장 목록 로드 실패 시 무시 */ });
}

/* ── 데이터 로드 ── */
function load(){
  var url=$('apiUrl').value.trim();
  if(!url){ $('list').innerHTML='<div class="empty">API 주소를 저장해주세요.</div>'; return; }
  // 로컬 파일(file://) 실행 시 경고
  if(location.protocol==='file:'){
    $('list').innerHTML='<div class="empty" style="color:var(--c2)">⚠️ 컴퓨터에 저장된 파일을 직접 열면 데이터를 불러올 수 없습니다.<br><br>'+
      '👉 <b>아래 인터넷 주소로 접속해주세요.</b><br><br>'+
      '<a href="https://cys9228.github.io/hyeonjanganjeon365/" style="font-size:14px;color:var(--green);font-weight:800;text-decoration:underline">https://cys9228.github.io/hyeonjanganjeon365/</a></div>';
    return;
  }
  $('list').innerHTML='<div class="loading">불러오는 중…</div>';
  var sep=url.indexOf('?')>=0?'&':'?';
  // photos=0 으로 먼저 목록만 빠르게 로드 (사진은 카드별 비동기)
  fetch(url+sep+'action=list&photos=1&n=300',{redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      allItems=(Array.isArray(data)?data:[]).filter(function(it){ return TYPES.indexOf(it.type)!==-1; });
      // 현장 드롭다운 자동 구성
      var sites=['전체'];
      allItems.forEach(function(it){ var s=String(it.site||'').trim(); if(s&&sites.indexOf(s)<0) sites.push(s); });
      var sel=$('siteFilter');
      // 담당자는 본인 현장만, 관리자는 전체
      var visibleSites = (loginRole==='staff') ? sites.filter(function(s){ return s===loginSiteValue; }) : sites;
      sel.innerHTML=visibleSites.map(function(s){ return '<option value="'+esc(s)+'"'+(s===activeSite?' selected':'')+'>'+esc(s==='전체'?'전체 현장':s)+'</option>'; }).join('');
      if(visibleSites.indexOf(activeSite)<0) activeSite = loginRole==='staff'?loginSiteValue:'전체';
      // 로그인 배너의 현장 드롭다운 — SITE_LIST 기준으로 유지 (이미 loadSiteList로 채워짐)
      // 데이터에서 새 현장 발견 시 SITE_LIST에 추가
      sites.filter(function(s){return s!=='전체';}).forEach(function(s){
        if(SITE_LIST.indexOf(s)<0) SITE_LIST.push(s);
      });
      render();
    })
    .catch(function(e){
      var msg = String(e);
      var hint = msg.indexOf('fetch')>=0||msg.indexOf('Failed')>=0
        ? '<br><br>👉 <b>인터넷 주소로 접속해주세요.</b><br><a href="https://cys9228.github.io/hyeonjanganjeon365/" style="font-size:13px;color:var(--green);font-weight:700;text-decoration:underline">https://cys9228.github.io/hyeonjanganjeon365/</a>'
        : '';
      $('list').innerHTML='<div class="empty" style="color:var(--c2)">불러오기 실패<br>'+msg+hint+'</div>';
    });
}

function inRange(it){
  var from=$('dFrom').value,to=$('dTo').value;
  if(!from&&!to) return true;
  var d=(it.date||'').replace(/\./g,'-');
  return (!from||d>=from)&&(!to||d<=to);
}
function today(){
  var d=new Date(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return d.getFullYear()+'.'+m+'.'+dd;
}

/* ── 렌더링 ── */
function render(){
  // 헤더 현장 라벨 업데이트
  var lbl=$('activeSiteLabel');

    $('prow').style.display='';
    $('pbar').innerHTML='<div class="done" style="width:'+(done/tot*100)+'%;height:100%"></div><div class="ing" style="width:'+(ing/tot*100)+'%;height:100%"></div><div class="none" style="width:'+(none/tot*100)+'%;height:100%"></div>';
    $('pct').textContent='조치완료 '+done+' / 조치중 '+ing+' / 미조치 '+none+' (총 '+tot+'건)';
  } else { $('prow').style.display='none'; }
  // 목록
  var view=activeType==='전체'?filtered:filtered.filter(function(it){ return it.type===activeType; });
  view.sort(function(a,b){ return (b.time||'').localeCompare(a.time||''); });
  if(!view.length){ $('list').innerHTML='<div class="empty">신고가 없습니다.</div>'; return; }
  // 카드 렌더링 (사진은 비동기)
  $('list').innerHTML=view.map(function(it){
    var st=it.status||'미조치';
    var sc=st==='조치완료'?'s2':st==='조치중'?'s1':'s0';
    return '<div class="icard" id="card_'+esc(it.id)+'">'+
      '<div class="icard-head">'+
        '<span class="badge'+(TYPES.indexOf(it.type)===-1?' etc':'')+'" data-t="'+esc(it.type)+'">'+esc(it.type)+'</span>'+
        '<span class="ctime">'+esc(it.time||'')+'</span>'+
        '<span class="cid">'+esc(it.id||'')+'</span>'+
      '</div>'+
      '<div class="ctitle">'+esc(it.note||it.hazard||'(내용 없음)')+'</div>'+
      '<div class="cmeta">'+
        '<span><b>현장</b> '+esc(it.site||'-')+'</span>'+
        '<span><b>위치</b> '+esc(it.location||'-')+'</span>'+

          '</div>'+
          '<div class="photo-grid" id="pgBefore_'+esc(it.id)+'"></div>'+
          '<span class="photo-ing" id="ingBefore_'+esc(it.id)+'">저장 중…</span>'+
        '</div>'+
        '<div class="photo-box action">'+
          '<div class="photo-box-title">✅ 조치 후 사진'+
            '<label style="font-size:11px;font-weight:600;color:var(--gd);cursor:pointer" class="admin-only inline">+ 추가<input type="file" accept="image/*" capture="environment" multiple style="display:none" class="pfile" data-id="'+esc(it.id)+'" data-type="after"></label>'+
          '</div>'+
          '<div class="photo-grid" id="pgAfter_'+esc(it.id)+'"></div>'+
          '<span class="photo-ing" id="ingAfter_'+esc(it.id)+'">저장 중…</span>'+
        '</div>'+
      '</div>'+
      '<div class="aibox" id="ai_'+esc(it.id)+'">'+
        (it._ai?aiHtml(it._ai):'<button class="aibtn" data-id="'+esc(it.id)+'" data-type="'+esc(it.type)+'" data-note="'+esc(it.note||'')+'">🤖 AI 위험분석</button>')+
      '</div>'+
      '<div class="strow">'+
        '<label>조치현황</label>'+
        '<select class="'+sc+' stedit" data-id="'+esc(it.id)+'">'+
          ['미조치','조치중','조치완료'].map(function(s){ return '<option'+(s===st?' selected':'')+'>'+s+'</option>'; }).join('')+
        '</select>'+
        '<input class="memo" data-id="'+esc(it.id)+'" placeholder="조치 내용 / 비고" value="'+esc(it.memo||'')+'">'+

        )+
      '</div>'+
      '<div class="card-actions admin-only">'+
        '<button class="btn sm edit-toggle" data-id="'+esc(it.id)+'">✏️ 내용편집</button>'+

        '</div>'+

          '<button class="btn sm outline ep-cancel" data-id="'+esc(it.id)+'">취소</button>'+

      '</div>'+

  // 사진 비동기 로드 (로컬 삭제 캐시 반영)
  view.forEach(function(it){
    var serverPhotos = it.photos||[];
    // 로컬에 저장된 삭제 후 목록이 있으면 그걸 사용 (새로고침 후에도 유지)
    var cachedKey = 'sf365_del_'+it.id;
    var cached = localStorage.getItem(cachedKey);
    var effectiveServer = cached ? JSON.parse(cached) : serverPhotos;
    it.photos = effectiveServer;
    loadPhotos(it.id,'before',function(localArr){
      var all = effectiveServer.concat(localArr||[]);
      renderPhotos(all,'pgBefore_'+it.id,it.id,'before',effectiveServer.length);
    });
    loadPhotos(it.id,'after',function(arr){ renderPhotos(arr,'pgAfter_'+it.id,it.id,'after',0); });
  });

  bindEvents(view);
}

function renderPhotos(arr,gridId,reportId,ptype,serverCount){
  var grid=$(gridId); if(!grid) return;
  if(!arr||!arr.length){
    if(!grid.children.length) grid.innerHTML='<div class="photo-empty" style="padding:16px;text-align:center;color:var(--sub);font-size:12px">사진 없음</div>';
    return;
  }
  grid.innerHTML='';
  arr.forEach(function(src,idx){
    var wrap=document.createElement('div'); wrap.className='photo-item';
    var img=document.createElement('img'); img.src=src;
    img.addEventListener('click',function(){ showLB(src); });
    wrap.appendChild(img);
    if(reportId && ptype){
      var isServerPhoto = (ptype==='before' && idx < (serverCount||0));
      var del=document.createElement('button'); del.className='photo-del'; del.title='사진 삭제'; del.innerHTML='✕';
      del.addEventListener('click',function(e){
        e.stopPropagation();
        if(!confirm('이 사진을 삭제하시겠습니까?')) return;
        var sc = serverCount||0;
        if(isServerPhoto){
          // 서버 사진 → allItems에서 제거 후 로컬 캐시에 저장 (API 불필요)
          var it = allItems.find(function(x){return String(x.id)===String(reportId);});
          if(it){
            it.photos = (it.photos||[]).slice();
            it.photos.splice(idx,1);
            // 로컬스토리지에 삭제 후 목록 저장 (새로고침 후에도 유지)
            localStorage.setItem('sf365_del_'+reportId, JSON.stringify(it.photos));
          }
          loadPhotos(reportId,ptype,function(localArr){
            var newServer = it?it.photos:[];
            renderPhotos(newServer.concat(localArr||[]),gridId,reportId,ptype,newServer.length);
          });
        } else {
          // 로컬 추가 사진
          var localIdx = idx - sc;
          loadPhotos(reportId,ptype,function(localArr){
            localArr.splice(localIdx,1);
            dbSet(photoKey(reportId,ptype),localArr);
            var serverPhotos2 = (allItems.find(function(x){return String(x.id)===String(reportId);})||{}).photos||[];
            renderPhotos(serverPhotos2.concat(localArr),gridId,reportId,ptype,serverPhotos2.length);
          });
        }
      });
      wrap.appendChild(del);
    }
    grid.appendChild(wrap);
  });
}

function showLB(src){ $('lbImg').src=src; $('lb').classList.add('show'); }

function bindEvents(view){
  // 사진 추가
  Array.prototype.forEach.call(document.querySelectorAll('.pfile'),function(inp){
    inp.addEventListener('change',function(){
      var files=Array.prototype.slice.call(inp.files||[]);
      if(!files.length) return;
      var id=inp.getAttribute('data-id');
      var type=inp.getAttribute('data-type'); // before | after
      var gridId=type==='before'?'pgBefore_'+id:'pgAfter_'+id;
      var ingId=type==='before'?'ingBefore_'+id:'ingAfter_'+id;
      var ing=$(ingId); if(ing) ing.style.display='';
      var done=0;
      files.forEach(function(file){
        compress(file,function(dataUrl){
          savePhoto(id,type,dataUrl,function(arr){
            done++;
            var serverPhotos2 = type==='before'?(allItems.find(function(x){return String(x.id)===String(id);})||{}).photos||[]:[];
            renderPhotos(serverPhotos2.concat(arr),gridId,id,type,serverPhotos2.length);
            if(done===files.length){ if(ing) ing.style.display='none'; inp.value=''; }
          });
        });
      });
    });
  });

  // 내용편집 토글
  Array.prototype.forEach.call(document.querySelectorAll('.edit-toggle'),function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id');
      var panel=$('editPanel_'+id);
      if(panel) panel.classList.toggle('show');
    });
  });

  // 편집 취소
  Array.prototype.forEach.call(document.querySelectorAll('.ep-cancel'),function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id');
      var panel=$('editPanel_'+id);
      if(panel) panel.classList.remove('show');
    });
  });

  // 편집 저장
  Array.prototype.forEach.call(document.querySelectorAll('.ep-save'),function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id');
      var noteEl=document.querySelector('.ep-note[data-id="'+id+'"]');
      var locEl=document.querySelector('.ep-loc[data-id="'+id+'"]');
      var note=noteEl?noteEl.value:'';
      var loc=locEl?locEl.value:'';
      btn.disabled=true; btn.textContent='저장 중…';
      var url=$('apiUrl').value.trim();
      if(!url){ alert('API 주소를 먼저 저장해주세요.'); btn.disabled=false; btn.textContent='💾 저장'; return; }
      var sep=url.indexOf('?')>=0?'&':'?';
      fetch(url+sep+'action=update&id='+encodeURIComponent(id)+'&note='+encodeURIComponent(note)+'&location='+encodeURIComponent(loc),{redirect:'follow'})
        .then(function(r){ return r.text(); })
        .then(function(txt){
          btn.disabled=false; btn.textContent='💾 저장';
          var res; try{ res=JSON.parse(txt); }catch(e){ res={ok:true}; }
          if(res&&res.ok!==false){
            var it=allItems.find(function(x){ return String(x.id)===String(id); });
            if(it){ it.note=note; it.hazard=note; it.location=loc; }
            var panel=$('editPanel_'+id); if(panel) panel.classList.remove('show');
            alert('저장되었습니다. ✅');
            render();
          } else { alert('저장 실패: '+(res&&res.error?res.error:'서버 오류')); }
        })
        .catch(function(err){
          btn.disabled=false; btn.textContent='💾 저장';
          alert('저장 실패: 네트워크 오류\n'+String(err));
        });
    });
  });

  // 신고 삭제
  Array.prototype.forEach.call(document.querySelectorAll('.delete-card'),function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id');
      var it=allItems.find(function(x){ return String(x.id)===String(id); });
      var label=it?(it.note||it.hazard||id):id;
      if(!confirm('신고를 삭제하시겠습니까?\n\n"'+label+'"\n\n삭제 후 복구할 수 없습니다.')) return;
      btn.disabled=true; btn.textContent='삭제 중…';
      apiCall('delete','&id='+encodeURIComponent(id),function(res){
        if(res&&res.ok!==false){
          allItems=allItems.filter(function(x){ return String(x.id)!==String(id); });
          // 로컬 사진도 삭제
          dbSet(photoKey(id,'before'),[]);
          dbSet(photoKey(id,'after'),[]);
          render();
        } else {
          btn.disabled=false; btn.textContent='🗑 신고삭제';
          alert('삭제 실패. 서버에서 삭제 기능을 지원하는지 확인해주세요.');
        }
      });
    });
  });

  // AI 분석
  Array.prototype.forEach.call(document.querySelectorAll('.aibtn'),function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id'), box=$('ai_'+id);
      box.innerHTML='<div class="aing">🤖 AI가 분석 중입니다…</div>';
      runAI(btn.getAttribute('data-type'),btn.getAttribute('data-note'),function(ai){
        var it=allItems.find(function(x){ return String(x.id)===String(id); });
        if(it) it._ai=ai;
        box.innerHTML=aiHtml(ai);
      });
    });
  });

  // 조치현황 변경
  Array.prototype.forEach.call(document.querySelectorAll('.stedit'),function(sel){
    sel.addEventListener('change',function(){
      var id=sel.getAttribute('data-id'),val=sel.value;
      sel.className=val==='조치완료'?'s2':val==='조치중'?'s1':'s0'; sel.disabled=true;
      apiCall('update','&id='+encodeURIComponent(id)+'&status='+encodeURIComponent(val),function(){
        sel.disabled=false;
        var it=allItems.find(function(x){ return String(x.id)===String(id); });
        if(it) it.status=val; render();
      });
    });
  });

  // 메모
  Array.prototype.forEach.call(document.querySelectorAll('.memo'),function(inp){
    inp.addEventListener('change',function(){
      var id=inp.getAttribute('data-id'),val=inp.value;
      apiCall('update','&id='+encodeURIComponent(id)+'&memo='+encodeURIComponent(val),function(){
        var it=allItems.find(function(x){ return String(x.id)===String(id); });
        if(it) it.memo=val;
      });
    });
  });

  // 최종확인
  Array.prototype.forEach.call(document.querySelectorAll('.approvebtn'),function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-id'); btn.disabled=true; btn.textContent='처리 중…';
      apiCall('approve','&id='+encodeURIComponent(id),function(res){
        if(res&&res.ok){
          var it=allItems.find(function(x){ return String(x.id)===String(id); });
          if(it){ it.approved=true; it.approvedAt=res.approvedAt||''; } render();
        } else { alert('최종확인 실패'); btn.disabled=false; btn.textContent='✅ 최종확인'; }
      });
    });
  });
}

function apiCall(action,params,cb){
  var url=$('apiUrl').value.trim(); if(!url) return;
  var sep=url.indexOf('?')>=0?'&':'?';
  fetch(url+sep+'action='+action+params)
    .then(function(r){ return r.json(); })
    .then(function(res){ if(cb) cb(res); })
    .catch(function(){ if(cb) cb(null); });
}

/* ── AI 분석 ── */
function aiHtml(ai){
  if(!ai) return '<span style="color:var(--c2);font-size:13px">분석 실패</span>';
  return '<div class="aihead"><span class="aititle">🤖 AI 위험분석</span><span class="rbadge '+esc(ai.level)+'">위험등급 '+esc(ai.level)+'</span></div>'+
    '<div class="aibody"><b>즉시조치:</b> '+esc(ai.action)+'<br><b>위험 메커니즘:</b> '+esc(ai.mechanism)+'</div>'+
    '<div class="ailaw">📋 '+esc(ai.law)+'</div>';
}
function runAI(type,note,cb){
  var prompt='건설현장 안전전문가로서 분석하여 JSON만 응답:\n신고유형: '+type+'\n내용: '+note+'\n{"level":"상|중|하","action":"즉시조치(2문장)","mechanism":"위험연결(1문장)","law":"관련법령"}';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})})
    .then(function(r){ return r.json(); })
    .then(function(d){ try{ cb(JSON.parse((d.content||[]).map(function(c){ return c.text||''; }).join('').replace(/```json|```/g,'').trim())); }catch(e){ cb(null); } })
    .catch(function(){ cb(null); });
}

/* ── TBM 브리핑 ── */
function renderBrief(filtered){
  var td=today();
  var tdItems=filtered.filter(function(it){ return it.date===td; });
  var counts={}; TYPES.forEach(function(t){ counts[t]=0; });
  tdItems.forEach(function(it){ if(counts[it.type]!==undefined) counts[it.type]++; });
  var RW={'불안전한 행동':1,'불안전한 상태':2,'아차사고':3,'위험성평가 및 개선제안':0};
  var rs=0; tdItems.forEach(function(it){ rs+=(RW[it.type]||0); });
  var rl=rs===0?'안전':rs<=2?'주의':rs<=5?'경고':'위험';
  var rc=rs===0?'#15a05a':rs<=2?'#f0ad4e':rs<=5?'#e67e22':'#c0392b';
  var unres=allItems.filter(function(it){ return (it.status||'미조치')!=='조치완료'; });
  var lc={}; unres.forEach(function(it){ var l=(it.location||'').trim(); if(l) lc[l]=(lc[l]||0)+1; });
  var hs=null; Object.keys(lc).forEach(function(l){ if(!hs||lc[l]>hs.count) hs={location:l,count:lc[l]}; });
  var st={'미조치':0,'조치중':0,'조치완료':0};
  tdItems.forEach(function(it){ var s=it.status||'미조치'; if(st[s]!==undefined) st[s]++; });
  var raM=allItems.filter(function(it){ return it.type==='위험성평가 및 개선제안'&&(it.date||'').substring(0,7)===td.substring(0,7); });
  var pp={}; raM.forEach(function(it){ pp[(it.reporter||'익명').trim()]=true; });
  unres.sort(function(a,b){ var aT=a.date===td?1:0,bT=b.date===td?1:0; if(aT!==bT) return bT-aT; return (b.time||'').localeCompare(a.time||''); });
  var key=unres.slice(0,8);
  $('brief').innerHTML=
    '<div class="brief-head"><h2>📋 오늘의 TBM 브리핑</h2>'+
    '<span style="color:var(--sub);font-size:12px">'+esc(td)+' · 오늘 신고 '+tdItems.length+'건</span>'+
    '<button class="btn sm outline" id="bfOpen">🖥️ 전체화면</button></div>'+
    '<div class="bstats">'+
      '<div class="bs"><div class="bs-l">🚨 위험지수</div><div class="bs-v" style="color:'+rc+'">'+rs+'점·'+rl+'</div></div>'+
      '<div class="bs"><div class="bs-l">📍 위험집중구역</div><div class="bs-v">'+(hs?esc(hs.location)+' ('+hs.count+'건)':'—')+'</div></div>'+
      '<div class="bs"><div class="bs-l">📊 오늘 신고현황</div><div class="bs-v">미조치 '+st['미조치']+' · 완료 '+st['조치완료']+'</div></div>'+
      '<div class="bs"><div class="bs-l">👷 위험성평가 참여</div><div class="bs-v">이번달 '+raM.length+'건 · '+Object.keys(pp).length+'명</div></div>'+

/* ── USB 저장/불러오기 ── */
function usbSave(){
  if(!db){ alert('DB가 준비되지 않았습니다.'); return; }
  var tx=db.transaction(DB_STORE,'readonly');
  var req=tx.objectStore(DB_STORE).getAll();
  req.onsuccess=function(e){
    var data=e.target.result||[];
    var json=JSON.stringify({ver:1,saved:new Date().toISOString(),photos:data},null,0);
    var d=new Date();
    var fname='신고함사진_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.json';

    // File System Access API 지원 시 → 위치 직접 선택
    if(window.showSaveFilePicker){
      window.showSaveFilePicker({
        suggestedName: fname,
        types:[{description:'신고함 데이터',accept:{'application/json':['.json']}}]
      }).then(function(fh){
        return fh.createWritable();
      }).then(function(w){
        return w.write(json).then(function(){ return w.close(); });
      }).then(function(){
        $('usbStatus').textContent='✅ 저장 완료 ('+data.length+'건)';
        setTimeout(function(){ $('usbStatus').textContent=''; },3000);
      }).catch(function(err){
        if(err.name!=='AbortError') alert('저장 실패: '+String(err));
      });
    } else {
      // 미지원 브라우저 → 다운로드 폴더로 저장
      var blob=new Blob([json],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download=fname; a.click();
      URL.revokeObjectURL(url);
      $('usbStatus').textContent='✅ 저장 완료 ('+data.length+'건)';
      setTimeout(function(){ $('usbStatus').textContent=''; },3000);
    }
  };
}

function usbLoad(file){
  if(!file) return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var obj=JSON.parse(e.target.result);
      var photos=obj.photos||[];
      if(!photos.length){ alert('사진 데이터가 없습니다.'); return; }
      var tx=db.transaction(DB_STORE,'readwrite');
      var store=tx.objectStore(DB_STORE);
      var done=0;
      photos.forEach(function(item){
        var req=store.put(item);
        req.onsuccess=function(){
          done++;
          if(done===photos.length){
            $('usbStatus').textContent='✅ 불러오기 완료 ('+photos.length+'건)';
            setTimeout(function(){ $('usbStatus').textContent=''; },3000);
            render(); // 화면 갱신
          }
        };
      });
    }catch(err){ alert('파일 형식이 잘못되었습니다: '+String(err)); }
  };
  r.readAsText(file);
}

/* ── TBM 참석 현황 ── */
function loadTbm(){
  var url=$('apiUrl').value.trim(); if(!url){ alert('API 주소를 먼저 저장해주세요.'); return; }
  var d=new Date(), td=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  $('tbmDate').textContent=td+' 기준';
  $('tbmSec').style.display='';
  var sep=url.indexOf('?')>=0?'&':'?';
  fetch(url+sep+'action=tbm_list&date='+td)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!Array.isArray(data)||!data.length){
        $('tbmCountBadge').innerHTML='0<span>명 참석</span>';
        $('tbmBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--sub);padding:20px">오늘 참석자가 없습니다.</td></tr>';
        return;
      }
      $('tbmCountBadge').innerHTML=data.length+'<span>명 참석 · '+esc(td)+'</span>';
      // 누계 집계
      var accY=data.filter(function(r){return r.acc==='있음';}).length;
      var accN=data.filter(function(r){return r.acc==='없음';}).length;
      var nearY=data.filter(function(r){return r.near==='있음';}).length;
      var nearN=data.filter(function(r){return r.near==='없음';}).length;
      $('tbmStats').innerHTML=
        '<div style="background:#e7f6ee;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#6b7280;font-weight:700;margin-bottom:4px">✅ 무사고</div>'+
          '<div style="font-size:20px;font-weight:800;color:#15a05a">'+accN+'명</div>'+
        '</div>'+
        '<div style="background:#fef2f2;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#6b7280;font-weight:700;margin-bottom:4px">🚨 사고발생</div>'+
          '<div style="font-size:20px;font-weight:800;color:#c0392b">'+accY+'명</div>'+
        '</div>'+
        '<div style="background:#e7f6ee;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#6b7280;font-weight:700;margin-bottom:4px">✅ 질병·상해없음</div>'+
          '<div style="font-size:20px;font-weight:800;color:#15a05a">'+nearN+'명</div>'+
        '</div>'+
        '<div style="background:#fef2f2;border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#6b7280;font-weight:700;margin-bottom:4px">🏥 질병·상해</div>'+
          '<div style="font-size:20px;font-weight:800;color:#c0392b">'+nearY+'명</div>'+
        '</div>';
      $('tbmBody').innerHTML=data.map(function(r,i){
        return '<tr>'+
          '<td>'+(i+1)+'</td>'+
          '<td><b>'+esc(r.name||'')+'</b></td>'+
          '<td>'+esc(r.dept||'')+'</td>'+
          '<td>'+esc(r.risk1||'-')+'</td>'+
          '<td>'+esc(r.risk2||'-')+'</td>'+
          '<td>'+esc(r.risk3||'-')+'</td>'+
          '<td style="color:'+(r.acc==='있음'?'#c0392b':'#15a05a')+';font-weight:700">'+
          (function(v){ var s=String(v||''); return (s==='있음'||s==='없음')?s:'-'; })(r.acc)+
          '</td>'+
          '<td style="color:'+(r.near==='있음'?'#c0392b':'#15a05a')+';font-weight:700">'+
          (function(v){ var s=String(v||''); return (s==='있음'||s==='없음')?s:'-'; })(r.near)+
          '</td>'+
          '<td>'+esc(r.time||'')+'</td>'+
          '<td style="color:var(--gd);font-weight:700">'+
          (function(v){
            if(!v||v===''||v==='undefined') return '-';
            // Date 객체 문자열이면 시간만 추출
            var m=String(v).match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
            return m?m[1].padStart(2,'0')+':'+m[2]:'-';
          })(r.outTime)+
          '</td>'+
        '</tr>';
      }).join('');
    })
    .catch(function(e){ $('tbmBody').innerHTML='<tr><td colspan="7" style="color:var(--c2);padding:16px">불러오기 실패: '+String(e)+'</td></tr>'; });
